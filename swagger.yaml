openapi: 3.0.3
info:
  title: Credit Approval Prediction API
  description: API для предсказания одобрения кредита на основе возраста, дохода и кредитной истории
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Локальный сервер разработки

paths:
  /:
    get:
      summary: Главная страница
      description: Приветственное сообщение сервера
      operationId: getHome
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Welcome to our server!"

  /predict:
    post:
      summary: Предсказание одобрения кредита
      description: Принимает данные клиента и возвращает решение о выдаче кредита с вероятностью
      operationId: predictCreditApproval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PredictionRequest'
            example:
              age: 30
              income: 75000
              history: 1
      responses:
        '200':
          description: Успешное предсказание
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictionResponse'
              example:
                approved: true
                probability: 0.85
        '400':
          description: Ошибка валидации входных данных
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noData:
                  summary: Нет данных
                  value:
                    error: "No data provided"
                missingFields:
                  summary: Отсутствуют обязательные поля
                  value:
                    error: "Missing required fields"

components:
  schemas:
    PredictionRequest:
      type: object
      required:
        - age
        - income
        - history
      properties:
        age:
          type: number
          description: Возраст клиента
          example: 30
        income:
          type: number
          description: Доход клиента
          example: 75000
        history:
          type: integer
          description: Наличие кредитной истории (1 - есть, 0 - нет)
          enum: [0, 1]
          example: 1

    PredictionResponse:
      type: object
      properties:
        approved:
          type: boolean
          description: Решение о выдаче кредита (true - одобрено, false - отказано)
          example: true
        probability:
          type: number
          format: float
          description: Вероятность одобрения кредита (от 0 до 1)
          example: 0.85

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Описание ошибки
          example: "Missing required fields"
  
